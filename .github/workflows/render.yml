name: Render Flutter Lesson

on:
  # يشتغل لما n8n يبعتله طلب عبر API
  workflow_dispatch:
    inputs:
      lesson_json:
        description: 'Lesson data as JSON string'
        required: true
      lesson_id:
        description: 'e.g. lesson_02'
        required: true
        default: 'lesson_01'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. نزل الكود
      - name: Checkout
        uses: actions/checkout@v4

      # 2. ثبّت Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. ثبّت الـ dependencies
      - name: Install dependencies
        run: npm ci

      # 4. حط الـ lesson JSON اللي جاي من n8n
      - name: Write lesson JSON
        run: |
          echo '${{ github.event.inputs.lesson_json }}' \
            > src/data/current_lesson.json

      # 5. حط الـ voiceover من الـ Secret
      #    (هنشرح ده تحت)
      - name: Write voiceover
        run: |
          echo "${{ secrets.VOICEOVER_B64 }}" | base64 -d \
            > src/assets/voiceover.mp3

      # 6. ثبّت الـ Chrome اللي Remotion محتاجه
      - name: Install Chrome
        run: npx remotion browser ensure

      # 7. ارندر الفيديو
      - name: Render video
        run: |
          npx remotion render FlutterLesson \
            out/${{ github.event.inputs.lesson_id }}.mp4 \
            --props='{"lesson": '"$(cat src/data/current_lesson.json)"', "voiceover": "voiceover.mp3"}'

      # 8. ارفع الفيديو كـ Artifact عشان تقدر تنزله
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.lesson_id }}
          path: out/${{ github.event.inputs.lesson_id }}.mp4
          retention-days: 3
