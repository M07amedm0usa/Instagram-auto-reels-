name: Render Flutter Lesson

on:
  push:
    paths:
      - 'src/data/**.json'   # يشتغل بس لو ملف JSON اتغير
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. نزل الكود — fetch-depth:2 ضروري عشان git diff HEAD~1 يشتغل
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 2. ثبّت Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. ثبّت الـ dependencies
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. اكتشف الملف اللي اتغير
      - name: Detect changed lesson file
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/data/*.json' | head -1)

          if [ -z "$CHANGED" ]; then
            echo "No JSON file changed, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LESSON_ID=$(basename "$CHANGED" .json)
          echo "file=$CHANGED"   >> $GITHUB_OUTPUT
          echo "id=$LESSON_ID"   >> $GITHUB_OUTPUT
          echo "skip=false"      >> $GITHUB_OUTPUT
          echo "Detected: $CHANGED -> ID: $LESSON_ID"

      # 5. حط الـ voiceover من الـ Secret
      #    GitHub -> Settings -> Secrets -> VOICEOVER_B64
      #    القيمة: base64 -w 0 voiceover.mp3
      - name: Write voiceover
        if: steps.changed.outputs.skip == 'false'
        run: |
          echo "${{ secrets.VOICEOVER_B64 }}" | base64 -d > src/assets/voiceover.mp3

      # 6. ثبّت الـ Chrome اللي Remotion محتاجه
      - name: Install Chromium
        if: steps.changed.outputs.skip == 'false'
        run: npx remotion browser ensure

      # 7. اعمل output folder — بدونه الرندر بيفشل
      - name: Create output directory
        if: steps.changed.outputs.skip == 'false'
        run: mkdir -p out

      # 8. ارندر الفيديو
      #    بنستخدم node عشان نبني الـ JSON بأمان بدون shell injection
      - name: Render video
        if: steps.changed.outputs.skip == 'false'
        run: |
          PROPS=$(node -e "
            const fs = require('fs');
            const lesson = JSON.parse(fs.readFileSync('${{ steps.changed.outputs.file }}', 'utf8'));
            process.stdout.write(JSON.stringify({ lesson, voiceover: 'voiceover.mp3' }));
          ")
          npx remotion render FlutterLesson \
            "out/${{ steps.changed.outputs.id }}.mp4" \
            --props="$PROPS" \
            --log=verbose

      # 9. ارفع الفيديو كـ Artifact (متاح 3 أيام للتنزيل)
      - name: Upload artifact
        if: steps.changed.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.changed.outputs.id }}
          path: out/${{ steps.changed.outputs.id }}.mp4
          retention-days: 3

      # 10. (اختياري) أبلغ n8n إن الرندر خلص — شيل الـ # لو عندك webhook
      # - name: Notify n8n
      #   if: steps.changed.outputs.skip == 'false'
      #   run: |
      #     curl -s -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
      #       -H "Content-Type: application/json" \
      #       -d '{"lesson_id":"${{ steps.changed.outputs.id }}","status":"done","run_id":"${{ github.run_id }}"}'
